<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>老人陪伴助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <div class="app-shell">
      <header class="hero">
        <p class="hero-kicker">老人陪伴助手</p>
        <h1>开口就能用的陪伴与求助</h1>
        <p id="hero-status" class="hero-status">已连接服务</p>
      </header>

      <main class="panel-container">
        <section id="panel-chat" class="panel active" aria-label="对话面板">
          <div class="panel-head">
            <h2>语音陪聊</h2>
            <p>语音为主，文字为辅</p>
          </div>

          <div id="chat-list" class="chat-list" aria-live="polite"></div>

          <div class="voice-box">
            <button id="voice-btn" class="voice-btn" type="button">按此开始语音</button>
            <p id="voice-status" class="voice-status">语音待命</p>
          </div>

          <form id="chat-form" class="chat-form">
            <input
              id="chat-input"
              type="text"
              inputmode="text"
              placeholder="输入内容，例如：每天 8:00 提醒我吃药"
              autocomplete="off"
            />
            <button type="submit">发送</button>
          </form>
        </section>

        <section id="panel-reminder" class="panel" aria-label="提醒面板">
          <div class="panel-head">
            <h2>提醒管理</h2>
            <p>吃药、喝水、复诊都可设置</p>
          </div>

          <form id="reminder-form" class="stack-form">
            <label>
              提醒内容
              <input id="reminder-title" type="text" required maxlength="40" placeholder="例如：吃降压药" />
            </label>
            <label>
              时间
              <input id="reminder-time" type="time" required />
            </label>
            <label>
              频率
              <select id="reminder-repeat">
                <option value="daily">每天</option>
                <option value="once">仅一次</option>
              </select>
            </label>
            <button type="submit">添加提醒</button>
          </form>

          <div id="reminder-list" class="reminder-list"></div>
        </section>

        <section id="panel-profile" class="panel" aria-label="资料面板">
          <div class="panel-head">
            <h2>我的资料</h2>
            <p>最小化信息，便于紧急联系</p>
          </div>

          <form id="profile-form" class="stack-form">
            <label>
              称呼
              <input id="profile-name" type="text" maxlength="30" placeholder="例如：王阿姨" />
            </label>
            <label>
              年龄
              <input id="profile-age" type="text" maxlength="10" placeholder="例如：68" />
            </label>
            <label>
              偏好
              <textarea id="profile-preferences" rows="2" maxlength="200" placeholder="例如：戏曲、散步"></textarea>
            </label>
            <label>
              备注
              <textarea id="profile-notes" rows="2" maxlength="300" placeholder="慢病、注意事项等"></textarea>
            </label>
            <label>
              紧急联系人
              <input id="profile-contact-name" type="text" maxlength="30" placeholder="姓名" />
            </label>
            <label>
              联系电话
              <input id="profile-contact-phone" type="tel" maxlength="20" placeholder="手机号" />
            </label>
            <button type="submit">保存资料</button>
          </form>
        </section>

        <section id="panel-family" class="panel" aria-label="家属面板">
          <div class="panel-head">
            <h2>家属查看</h2>
            <p>关键记录可追溯</p>
          </div>

          <div class="summary-grid">
            <article>
              <p class="summary-key">对话次数</p>
              <p id="sum-chat" class="summary-value">-</p>
            </article>
            <article>
              <p class="summary-key">7天紧急事件</p>
              <p id="sum-emergency" class="summary-value">-</p>
            </article>
            <article>
              <p class="summary-key">7天提醒事件</p>
              <p id="sum-reminder" class="summary-value">-</p>
            </article>
            <article>
              <p class="summary-key">已启用提醒</p>
              <p id="sum-enabled" class="summary-value">-</p>
            </article>
          </div>

          <div class="inline-tools">
            <select id="log-type">
              <option value="all">全部</option>
              <option value="conversation">对话</option>
              <option value="reminder">提醒</option>
              <option value="emergency">紧急</option>
            </select>
            <button id="refresh-logs" type="button">刷新记录</button>
          </div>

          <div id="log-list" class="log-list"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-item active" data-target="chat" type="button">对话</button>
        <button class="nav-item" data-target="reminder" type="button">提醒</button>
        <button class="nav-item" data-target="profile" type="button">我的</button>
        <button class="nav-item" data-target="family" type="button">家属</button>
      </nav>
    </div>

    <div id="emergency-modal" class="emergency-modal hidden" role="dialog" aria-modal="true">
      <div class="emergency-card">
        <p class="emergency-tag">紧急模式</p>
        <h3>检测到高风险表达</h3>
        <p>请先保持安全体位，然后按顺序执行：</p>
        <ol>
          <li>立即拨打 120，说明地址与症状。</li>
          <li>联系紧急联系人，请求到场协助。</li>
          <li>保持语音沟通，等待帮助到达。</li>
        </ol>
        <div class="emergency-actions">
          <a id="call-120" href="tel:120">拨打 120</a>
          <a id="call-contact" href="#">联系紧急联系人</a>
        </div>
        <button id="close-emergency" type="button">我已处理，关闭弹窗</button>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
